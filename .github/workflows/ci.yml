name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tachyonapp"
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm run lint
      - run: npm test
      - name: Type check
        run: npx tsc --noEmit

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          secrets: |
            node_auth_token=${{ secrets.NODE_AUTH_TOKEN }}
          tags: |
            ghcr.io/tachyonapp/tachyon-workers:${{ github.sha }}
            ghcr.io/tachyonapp/tachyon-workers:latest

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/tachyonapp/tachyon-workers:${{ github.sha }}
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os"
          skip-dirs: /tmp,/var/cache,/var/tmp,**/node_modules
          skip-files: LICENSE,README.md,.gitignore

  check-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify lockfile exists
        run: test -f package-lock.json || (echo "Missing package-lock.json" && exit 1)

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified